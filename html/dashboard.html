<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<header class="header">
    <div class="header-content">
        <h2>Quantity Measurement</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</header>

<div class="main-wrapper">
    <div class="container">
        <section class="section">
            <h3 class="section-title">CHOOSE TYPE</h3>
            <div class="type-grid">
                <div class="type-card active" onclick="setType('LengthUnit', this)">
                    <div class="icon-box length-icon">📏</div>
                    <span>Length</span>
                </div>
                <div class="type-card" onclick="setType('WeightUnit', this)">
                    <div class="icon-box weight-icon">⚖️</div>
                    <span>Weight</span>
                </div>
                <div class="type-card" onclick="setType('TemperatureUnit', this)">
                    <div class="icon-box temp-icon">🌡️</div>
                    <span>Temperature</span>
                </div>
                <div class="type-card" onclick="setType('VolumeUnit', this)">
                    <div class="icon-box volume-icon">🥤</div>
                    <span>Volume</span>
                </div>
            </div>
        </section>

        <section class="section">
            <h3 class="section-title">CHOOSE ACTION</h3>
            <div class="action-grid">
                <button class="action-btn" onclick="setAction('compare', this)">Comparison</button>
                <button class="action-btn" onclick="setAction('convert', this)">Conversion</button>
                <button class="action-btn active" onclick="setAction('arithmetic', this)">Arithmetic</button>            </div>
        </section>

        <div class="calculator-card">
            <div class="input-group">
                <div class="input-field">
                    <label>VALUE 1</label>
                    <input type="number" id="value1" value="1">
                    <select id="unit1"></select>
                </div>

                <div class="operator-container">
                    <select id="operator-select" class="operator-dropdown" onchange="updateSelectedAction()">
                        <option value="add">+</option>
                        <option value="subtract">-</option>
                        <option value="divide">/</option>
                    </select>
                    <div id="operator-static" class="operator-box" style="display:none;">→</div>
                </div>

                <div class="input-field">
                    <label>VALUE 2</label>
                    <input type="number" id="value2" value="1">
                    <select id="unit2"></select>
                </div>
            </div>

            <button class="calculate-btn" onclick="calculate()">View Result</button>

            <div id="result-box" class="result-display" style="display:none;">
                <label>RESULT</label>
                <div class="result-row">
                    <h2 id="result-text">0.00</h2>
                    <span id="result-unit-label">Unit</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../js/dashboard.js"></script>
</body>
</html>
